<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IG 發文上傳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 600px; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
    .drop-zone { border: 2px dashed #555; border-radius: 12px; padding: 30px; text-align: center; color: #888; cursor: pointer; margin-bottom: 16px; }
    .drop-zone:hover { border-color: #aaa; }
    .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .preview-item { position: relative; }
    .preview-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .preview-item .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
    .hint { font-size: 0.75rem; color: #666; margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #ccc; }
    textarea { width: 100%; height: 140px; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 0.95rem; resize: vertical; }
    .btn { width: 100%; margin-top: 16px; padding: 14px; background: #6c63ff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; }
    .msg.success { background: #1a3a1a; color: #6fcf6f; }
    .msg.error { background: #3a1a1a; color: #f28b82; }
    .progress { margin-top: 10px; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
<div class="container">
  <h1>🗂 IG 發文上傳</h1>

  <div class="drop-zone" id="dropZone">點此選擇圖片，或拖曳圖片到這裡</div>
  <input type="file" id="fileInput" multiple accept="image/*" style="display:none"/>

  <div class="preview-grid" id="previewGrid"></div>
  <p class="hint">拖曳圖片可調整順序，點圖片可放大預覽</p>

  <label>文案</label>
  <textarea id="caption" placeholder="輸入 IG 文案..."></textarea>

  <button class="btn" id="uploadBtn">🚀 上傳並儲存到 Notion</button>
  <div class="progress" id="progress"></div>
  <div id="message"></div>
</div>

<script>
  const CLOUD_NAME = 'dy6uwswgf';
  const UPLOAD_PRESET = 'ig_upload';

  let files = [];

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewGrid = document.getElementById('previewGrid');
  const uploadBtn = document.getElementById('uploadBtn');
  const progress = document.getElementById('progress');
  const message = document.getElementById('message');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#fff'; });
  dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#555');
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = '#555';
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

  function addFiles(newFiles) {
    newFiles.forEach(f => { if (f.type.startsWith('image/')) files.push(f); });
    renderPreviews();
  }

  function renderPreviews() {
    previewGrid.innerHTML = '';
    files.forEach((f, i) => {
      const url = URL.createObjectURL(f);
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.draggable = true;
      div.dataset.index = i;
      div.innerHTML = `
        <span style="position:absolute;top:4px;left:6px;font-size:11px;background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:4px;">${i+1}</span>
        <img src="${url}" onclick="window.open('${url}')"/>
        <button class="remove" onclick="removeFile(${i})">×</button>
      `;
      div.addEventListener('dragstart', dragStart);
      div.addEventListener('dragover', dragOver);
      div.addEventListener('drop', dragDrop);
      previewGrid.appendChild(div);
    });
  }

  function removeFile(i) { files.splice(i, 1); renderPreviews(); }

  let dragSrc = null;
  function dragStart(e) { dragSrc = +this.dataset.index; }
  function dragOver(e) { e.preventDefault(); }
  function dragDrop(e) {
    e.preventDefault();
    const target = +this.dataset.index;
    if (dragSrc === target) return;
    const tmp = files[dragSrc];
    files[dragSrc] = files[target];
    files[target] = tmp;
    renderPreviews();
  }

  async function uploadToCloudinary(file, index) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('folder', 'ig-posts');

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (!data.secure_url) throw new Error(`圖片 ${index+1} 上傳失敗`);
    return { url: data.secure_url, name: file.name };
  }

  uploadBtn.addEventListener('click', async () => {
    if (files.length === 0) { showMsg('請先選擇圖片', 'error'); return; }
    const caption = document.getElementById('caption').value.trim();
    if (!caption) { showMsg('請輸入文案', 'error'); return; }

    uploadBtn.disabled = true;
    message.innerHTML = '';

    try {
      // Step 1：逐張上傳到 Cloudinary
      const urls = [];
      const fileNames = [];
      for (let i = 0; i < files.length; i++) {
        progress.textContent = `上傳圖片中... ${i+1} / ${files.length}`;
        const result = await uploadToCloudinary(files[i], i);
        urls.push(result.url);
        fileNames.push(result.name);
      }

      // Step 2：把 URL + 文案 + 檔名傳給 Vercel API 存到 Notion
      progress.textContent = '儲存到 Notion...';
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          imageUrls: urls, 
          caption,
          fileNames: fileNames  // ✅ 用 Step 1 收集的順序
        })
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || '儲存失敗');

      progress.textContent = '';
      showMsg(`✅ 成功！已上傳 ${urls.length} 張圖片並儲存到 Notion`, 'success');
      files = [];
      renderPreviews();
      document.getElementById('caption').value = '';

    } catch (err) {
      progress.textContent = '';
      showMsg('❌ ' + err.message, 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  });

  function showMsg(text, type) {
    message.innerHTML = `<div class="msg ${type}">${text}</div>`;
  }
</script>
</body>
</html>
