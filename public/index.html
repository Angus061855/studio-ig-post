<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IG 發文上傳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 600px; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }

    /* Tab */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; background: #1e1e1e; color: #888; transition: all 0.2s; }
    .tab-btn.active { background: #6c63ff; color: #fff; }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; }

    .drop-zone { border: 2px dashed #555; border-radius: 12px; padding: 30px; text-align: center; color: #888; cursor: pointer; margin-bottom: 16px; }
    .drop-zone:hover { border-color: #aaa; }
    .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .preview-item { position: relative; display: flex; flex-direction: column; align-items: center; }
    .preview-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .preview-item .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
    .preview-item .filename { font-size: 10px; color: #aaa; margin-top: 4px; word-break: break-all; text-align: center; width: 100%; padding: 0 2px; }
    .hint { font-size: 0.75rem; color: #666; margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #ccc; }
    textarea { width: 100%; height: 140px; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 0.95rem; resize: vertical; }
    .btn { width: 100%; margin-top: 16px; padding: 14px; background: #6c63ff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; }
    .msg.success { background: #1a3a1a; color: #6fcf6f; }
    .msg.error { background: #3a1a1a; color: #f28b82; }
    .progress { margin-top: 10px; font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>
<div class="container">
  <h1>🗂 媒體上傳工具</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('post')">📸 IG 發文</button>
    <button class="tab-btn" onclick="switchTab('story')">⚡ 限時動態</button>
  </div>

  <!-- IG 發文 Panel -->
  <div class="panel active" id="panel-post">
    <div class="drop-zone" id="dropZone-post">點此選擇圖片，或拖曳圖片到這裡</div>
    <input type="file" id="fileInput-post" multiple accept="image/*" style="display:none"/>
    <div class="preview-grid" id="previewGrid-post"></div>
    <p class="hint">拖曳圖片可調整順序，點圖片可放大預覽</p>
    <label>文案</label>
    <textarea id="caption-post" placeholder="輸入 IG 文案..."></textarea>
    <button class="btn" id="uploadBtn-post">🚀 上傳並儲存到 Notion</button>
    <div class="progress" id="progress-post"></div>
    <div id="message-post"></div>
  </div>

  <!-- 限時動態 Panel -->
  <div class="panel" id="panel-story">
    <div class="drop-zone" id="dropZone-story">點此選擇圖片，或拖曳圖片到這裡</div>
    <input type="file" id="fileInput-story" multiple accept="image/*" style="display:none"/>
    <div class="preview-grid" id="previewGrid-story"></div>
    <p class="hint">拖曳圖片可調整順序，點圖片可放大預覽</p>
    <button class="btn" id="uploadBtn-story">⚡ 上傳限時動態到 Notion</button>
    <div class="progress" id="progress-story"></div>
    <div id="message-story"></div>
  </div>
</div>

<script>
  const CLOUD_NAME = 'dy6uwswgf';
  const UPLOAD_PRESET = 'ig_upload';

  // ── Tab 切換 ──
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    document.querySelectorAll('.tab-btn')[tab === 'post' ? 0 : 1].classList.add('active');
  }

  // ── 通用上傳邏輯（post / story 共用） ──
  function initPanel(type) {
    let files = [];
    let dragSrc = null;

    const dropZone = document.getElementById('dropZone-' + type);
    const fileInput = document.getElementById('fileInput-' + type);
    const previewGrid = document.getElementById('previewGrid-' + type);
    const uploadBtn = document.getElementById('uploadBtn-' + type);
    const progress = document.getElementById('progress-' + type);
    const message = document.getElementById('message-' + type);

    dropZone.addEventListener('click', () => fileInput.click()); fileInput.addEventListener('click', (e) => e.stopPropagation());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#fff'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#555');
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.borderColor = '#555';
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => {
      addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    function addFiles(newFiles) {
      newFiles.forEach(f => { if (f.type.startsWith('image/')) files.push(f); });
      renderPreviews();
    }

    function renderPreviews() {
      previewGrid.innerHTML = '';
      files.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.draggable = true;
        div.dataset.index = i;

        const imgWrapper = document.createElement('div');
        imgWrapper.style.position = 'relative';
        imgWrapper.style.width = '100%';
        imgWrapper.innerHTML = `
          <span style="position:absolute;top:4px;left:6px;font-size:11px;background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:4px;z-index:1;">${i + 1}</span>
          <img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="window.open('${url}')"/>
          <button class="remove" onclick="removeFile_${type}(${i})">×</button>
        `;

        const nameEl = document.createElement('div');
        nameEl.className = 'filename';
        nameEl.textContent = f.name;

        div.appendChild(imgWrapper);
        div.appendChild(nameEl);
        div.addEventListener('dragstart', e => { dragSrc = +div.dataset.index; });
        div.addEventListener('dragover', e => e.preventDefault());
        div.addEventListener('drop', e => {
          e.preventDefault();
          const target = +div.dataset.index;
          if (dragSrc === null || dragSrc === target) return;
          const tmp = files[dragSrc];
          files[dragSrc] = files[target];
          files[target] = tmp;
          dragSrc = null;
          renderPreviews();
        });
        previewGrid.appendChild(div);
      });
    }

    // 掛到 window 讓 inline onclick 可以呼叫
    window['removeFile_' + type] = function(i) {
      files.splice(i, 1);
      renderPreviews();
    };

    async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const MAX = 2000;
      let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      if (h > MAX) { w = w * MAX / h; h = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}
    
    async function uploadToCloudinary(file, index) {
      file = await compressImage(file);
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);
      formData.append('folder', 'ig-posts');
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
      });
      const data = await res.json();
      if (!data.secure_url) throw new Error(`圖片 ${index + 1} 上傳失敗`);
      return { url: data.secure_url, name: file.name };
    }

    uploadBtn.addEventListener('click', async () => {
      if (files.length === 0) { showMsg('請先選擇圖片', 'error'); return; }

      // 只有 post 需要文案
      let caption = '';
      if (type === 'post') {
        caption = document.getElementById('caption-post').value.trim();
        if (!caption) { showMsg('請輸入文案', 'error'); return; }
      }

      uploadBtn.disabled = true;
      message.innerHTML = '';

      try {
        const urls = [];
        const fileNames = [];
        for (let i = 0; i < files.length; i++) {
          progress.textContent = `上傳圖片中... ${i + 1} / ${files.length}`;
          const result = await uploadToCloudinary(files[i], i);
          urls.push(result.url);
          fileNames.push(result.name);
        }

        progress.textContent = '儲存到 Notion...';
        const endpoint = type === 'post' ? '/api/upload' : '/api/upload-story';
        const body = type === 'post'
          ? { imageUrls: urls, caption, fileNames }
          : { imageUrls: urls, fileNames };

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const result = await res.json();
        if (!res.ok) throw new Error(result.error || '儲存失敗');

        progress.textContent = '';
        showMsg(`✅ 成功！已上傳 ${urls.length} 張圖片並儲存到 Notion`, 'success');
        files = [];
        renderPreviews();
        if (type === 'post') document.getElementById('caption-post').value = '';

      } catch (err) {
        progress.textContent = '';
        showMsg('❌ ' + err.message, 'error');
      } finally {
        uploadBtn.disabled = false;
      }
    });

    function showMsg(text, type) {
      message.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }
  }

  // 初始化兩個 panel
  initPanel('post');
  initPanel('story');
</script>
</body>
</html>
