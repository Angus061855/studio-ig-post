<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG 發文上傳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      border: 1px solid #2a2a2a;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #ffffff; }
    label { display: block; font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 6px; }
    .field { margin-bottom: 20px; }
    .upload-area {
      width: 100%;
      padding: 20px;
      border: 2px dashed #333;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      color: #555;
      text-align: center;
      transition: border 0.2s, color 0.2s;
      background: #111;
    }
    .upload-area:hover { border-color: #6366f1; color: #6366f1; }
    input[type="file"] { display: none; }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      font-size: 15px;
      color: #eee;
      background: #111;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #444; }

    .preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 10px;
      overflow: visible;
      border: 2px solid #2a2a2a;
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }
    .preview-item:active { cursor: grabbing; }
    .preview-item.dragging { opacity: 0.3; transform: scale(0.95); }
    .preview-item.drag-over { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.25); }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      display: block;
      border-radius: 8px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    /* hover 放大，用 z-index 讓它蓋在其他圖片上 */
    .preview-item:hover {
      z-index: 10;
    }
    .preview-item:hover img {
      transform: scale(2.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    }

    .preview-item .num {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11;
    }
    .preview-item .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 12px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 11;
    }
    .hint { font-size: 12px; color: #444; margin-top: 6px; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    .result.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .result.error { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 IG 發文上傳</h1>
    <form id="uploadForm">
      <div class="field">
        <label>選擇圖片（可多選）</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('images').click()">
          點此選擇圖片，或拖曳圖片到這裡
        </div>
        <input type="file" id="images" accept="image/*" multiple>
        <div class="preview-area" id="previewArea"></div>
        <p class="hint" id="hint" style="display:none">拖曳圖片可調整輪播順序，左上角數字是發布順序，滑鼠移上去可放大預覽</p>
      </div>
      <div class="field">
        <label>文案</label>
        <textarea id="caption" placeholder="輸入 IG 文案..."></textarea>
      </div>
      <button type="submit" id="submitBtn">🚀 上傳並儲存到 Notion</button>
    </form>
    <div class="result" id="result"></div>
  </div>

  <script>
    let items = [];
    let dragSrcIndex = null;

    const previewArea = document.getElementById('previewArea');
    const hint = document.getElementById('hint');

    function readAsDataURL(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('images').addEventListener('change', async function () {
      for (const file of Array.from(this.files)) {
        const previewUrl = await readAsDataURL(file);
        items.push({ file, previewUrl });
      }
      renderPreview();
      this.value = '';
    });

    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#6366f1'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#333'; });
    uploadArea.addEventListener('drop', async e => {
      e.preventDefault();
      uploadArea.style.borderColor = '#333';
      for (const file of Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))) {
        const previewUrl = await readAsDataURL(file);
        items.push({ file, previewUrl });
      }
      renderPreview();
    });

    function renderPreview() {
      previewArea.innerHTML = '';
      hint.style.display = items.length === 0 ? 'none' : 'block';

      items.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'preview-item';
        el.draggable = true;
        el.dataset.index = index;

        el.innerHTML = `
          <img src="${item.previewUrl}" />
          <div class="num">${index + 1}</div>
          <div class="remove">✕</div>
        `;

        el.addEventListener('dragstart', () => {
          dragSrcIndex = index;
          setTimeout(() => el.classList.add('dragging'), 0);
        });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
          e.preventDefault();
          el.classList.remove('drag-over');
          if (dragSrcIndex === null || dragSrcIndex === index) return;
          const moved = items.splice(dragSrcIndex, 1)[0];
          items.splice(index, 0, moved);
          dragSrcIndex = null;
          renderPreview();
        });

        el.querySelector('.remove').addEventListener('click', e => {
          e.stopPropagation();
          items.splice(index, 1);
          renderPreview();
        });

        previewArea.appendChild(el);
      });
    }

    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      if (items.length === 0) { alert('請選擇至少一張圖片'); return; }

      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '上傳中...';
      result.style.display = 'none';

      const formData = new FormData();
      formData.append('caption', document.getElementById('caption').value);
      items.forEach(item => formData.append('images', item.file));

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          result.className = 'result success';
          result.textContent = `✅ 上傳成功！共 ${data.images.length} 張，順序已儲存到 Notion`;
          items = [];
          renderPreview();
          document.getElementById('caption').value = '';
        } else {
          result.className = 'result error';
          result.textContent = '❌ 失敗：' + data.error;
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = '❌ 網路錯誤，請再試一次';
      }

      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '🚀 上傳並儲存到 Notion';
    });
  </script>
</body>
</html>
